<!DOCTYPE html>
<html>
<head>
    <title>Run Reconciliation</title>
    <style>
        body { font-family: Arial; background: #f4f6f8; }

        .container {
            width: 500px;
            margin: 50px auto;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 12px rgba(0,0,0,0.08);
        }

        h2 { text-align: center; }

        label {
            font-weight: bold;
            display: block;
            margin-top: 15px;
        }

        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
        }

        .option-box {
            margin-top: 10px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            padding: 12px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
        }

        button:disabled {
            background: gray;
        }

        /* 🔥 Flash Messages */
        .alert {
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 5px;
            font-weight: bold;
        }

        .alert.success { background: #d4edda; color: #155724; }
        .alert.error { background: #f8d7da; color: #721c24; }
        .alert.warning { background: #fff3cd; color: #856404; }

        /* 🔥 Loader */
        .loader {
            display: none;
            text-align: center;
            margin-top: 15px;
            font-weight: bold;
            color: #007BFF;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Run Reconciliation</h2>

    <!-- 🔥 Flash Messages -->
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
            {% for category, message in messages %}
                <div class="alert {{ category }}">{{ message }}</div>
            {% endfor %}
        {% endif %}
    {% endwith %}

    <form method="POST" action="/reconcile" enctype="multipart/form-data" onsubmit="return startProcess(event)">

    <!-- Input type -->
    <label>Select Input Source</label>
    <select name="input_type" id="input_type" required onchange="toggleInput()">
        <option value="">-- Select --</option>
        <option value="csv">Upload CSV Files</option>
        <option value="db">Use Database Logs</option>
    </select>

    <!-- CSV -->
    <div id="csv_box" class="option-box" style="display:none;">
        <label>Gateway Logs CSV</label>
        <input type="file" name="gateway_file" accept=".csv" id="gateway_file">

        <label>Transaction Logs CSV</label>
        <input type="file" name="txn_file" accept=".csv" id="txn_file">
    </div>

    <!-- DB -->
    <div id="db_box" class="option-box" style="display:none;">
        <p>Will use latest gateway logs from database</p>
    </div>

    <button id="submitBtn" type="submit">Run Reconciliation</button>

</form>

    <!-- 🔥 Processing message -->
    <div id="loader" class="loader">
        ⏳ Processing... Please wait
    </div>

</div>

<script>
let jobId = null;

// 🔥 Toggle input (same)
function toggleInput() {
    const type = document.getElementById("input_type").value;

    const isCSV = type === "csv";

    document.getElementById("csv_box").style.display = isCSV ? "block" : "none";
    document.getElementById("db_box").style.display = type === "db" ? "block" : "none";

    document.getElementById("gateway_file").required = isCSV;
    document.getElementById("txn_file").required = isCSV;
}

// 🔥 Submit form via fetch instead of normal POST
async function startProcess(event) {
    event.preventDefault();

    document.getElementById("loader").style.display = "block";
    document.getElementById("submitBtn").disabled = true;
    document.getElementById("loader").innerHTML = "⏳ Starting reconciliation...";

    const form = event.target;
    const formData = new FormData(form);

    try {
        const response = await fetch("/reconcile", {
            method: "POST",
            body: formData
        });

        const data = await response.json();

        jobId = data.job_id;

        if (!jobId) {
            document.getElementById("loader").innerHTML = "❌ Failed to start job";
            return;
        }

        // 🔥 Start polling
        checkStatus();

    } catch (err) {
        document.getElementById("loader").innerHTML = "❌ Error starting job";
    }

    return false;
}

// 🔥 Poll job status
async function checkStatus() {
    if (!jobId) return;

    try {
        const res = await fetch(`/job_status/${jobId}`);
        const data = await res.json();

        if (data.status === "RUNNING") {
            document.getElementById("loader").innerHTML = "⏳ Processing...";
            setTimeout(checkStatus, 2000);
        }

        else if (data.status === "SUCCESS") {
            document.getElementById("loader").innerHTML =
                `✅ Completed! <br><a href="/results?job_id=${jobId}">View Results</a>`;
        }

        else if (data.status === "FAILED") {
            document.getElementById("loader").innerHTML =
                `❌ Failed: ${data.message}`;
        }

    } catch (err) {
        document.getElementById("loader").innerHTML = "❌ Error checking status";
    }
}
</script>


</body>
</html>
